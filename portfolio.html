<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>unavoltavevolabarba | Portfolio</title>
    <meta
      name="description"
      content="Una selezione dei progetti realizzati da Francesco."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="nav.js?v=5" defer></script>
    <script src="site-share.js" defer></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        --black: #000;
        --white: #fff;
        --dim: rgba(255, 255, 255, 0.5);
        --line: rgba(255, 255, 255, 0.16);
        --sans:
          "Adelle Sans", "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --mono: "Space Mono", monospace;
      }

      html {
        background: var(--black);
      }

      body {
        margin: 0;
        background: var(--black);
        color: var(--white);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }

      main {
        width: min(1440px, 100%);
        min-height: 100svh;
        margin: 0 auto;
        padding: clamp(150px, 18vw, 250px) clamp(24px, 5vw, 72px) 150px;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--dim);
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 clamp(64px, 10vw, 130px);
        font-size: clamp(4rem, 13vw, 12rem);
        font-weight: 700;
        letter-spacing: -0.065em;
        line-height: 0.8;
      }

      .projects {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: clamp(32px, 4vw, 64px);
      }

      .project {
        color: inherit;
        text-decoration: none;
      }

      .cover {
        position: relative;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        border-radius: 4px;
        background: #101010;
      }

      .cover img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .project:hover .cover img {
        transform: scale(1.025);
      }

      .project-info {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        align-items: start;
        padding: 18px 0 28px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0 0 7px;
        font-size: clamp(1.5rem, 2.7vw, 2.7rem);
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .project-meta {
        margin: 0;
        color: var(--dim);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .arrow {
        font-size: clamp(1.5rem, 2.7vw, 2.7rem);
        line-height: 0.8;
        transition: transform 0.25s ease;
      }

      .project:hover .arrow {
        transform: translate(4px, -4px);
      }

      @media (max-width: 700px) {
        main {
          padding-top: 150px;
        }
        h1 {
          margin-bottom: 70px;
        }
        .projects {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cover img,
        .arrow {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Progetti selezionati</p>
      <h1>Portfolio</h1>

      <section class="projects" aria-label="Progetti">
        <a
          class="project deep-cat-blue"
          href="https://github.com/frank-pw/deep-cat-blue"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="cover">
            <img
              src="assets/preview.png"
              alt="Anteprima del tema Deep Cat Blue in Visual Studio Code"
            />
          </div>
          <div class="project-info">
            <div>
              <h2>deep-cat-blue</h2>
              <p class="project-meta">Tema VS Code</p>
            </div>
            <span class="arrow" aria-hidden="true">↗</span>
          </div>
        </a>

        <a
          class="project cordyceps"
          href="https://github.com/frank-pw/cordyceps"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="cover">
            <img
              src="assets/preview%202.png"
              alt="Anteprima del tema Cordyceps in Obsidian"
            />
          </div>
          <div class="project-info">
            <div>
              <h2>cordyceps</h2>
              <p class="project-meta">Tema Obsidian</p>
            </div>
            <span class="arrow" aria-hidden="true">↗</span>
          </div>
        </a>

        <a
          class="project bandcamp"
          href="https://frankpw.bandcamp.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="cover">
            <img
              src="assets/kids-bandcamp.jpg"
              alt="Copertina di Kids di Frank PW"
            />
          </div>
          <div class="project-info">
            <div>
              <h2>Frank PW</h2>
              <p class="project-meta">Chill Music</p>
            </div>
            <span class="arrow" aria-hidden="true">↗</span>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
