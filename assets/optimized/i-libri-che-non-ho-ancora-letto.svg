<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Una pila di libri non ancora letti su un comodino</title>
  <desc id="desc">Illustrazione editoriale con libri impilati, una lampada calda e un taccuino, pensata come immagine per un post sui libri ancora da leggere.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#D8F5E5"/>
      <stop offset="0.55" stop-color="#FAF8EF"/>
      <stop offset="1" stop-color="#FFF7B8"/>
    </linearGradient>
    <linearGradient id="table" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#E85F00"/>
      <stop offset="1" stop-color="#9D4100"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#141414" flood-opacity="0.22"/>
    </filter>
    <filter id="lampGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#wall)"/>
  <circle cx="1200" cy="245" r="250" fill="#FFF7B8" opacity="0.55" filter="url(#lampGlow)"/>
  <path d="M0 710C250 668 429 737 665 702C920 664 1138 647 1600 700V900H0Z" fill="#141414" opacity="0.06"/>
  <rect y="650" width="1600" height="250" fill="url(#table)"/>

  <g transform="translate(920 190)" filter="url(#softShadow)">
