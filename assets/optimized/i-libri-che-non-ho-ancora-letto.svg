    <rect x="170" y="438" width="214" height="42" rx="3" fill="#9299B2"/>
  </g>

  <g transform="translate(350 245)" filter="url(#softShadow)">
    <rect x="52" y="330" width="470" height="72" rx="8" fill="#FFF7B8"/>
    <rect x="88" y="340" width="370" height="10" fill="#141414" opacity="0.14"/>
