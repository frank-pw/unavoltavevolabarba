    <rect x="60" y="42" width="470" height="84" rx="8" fill="#FAF8EF"/>
    <rect x="105" y="58" width="330" height="11" fill="#141414" opacity="0.18"/>
    <rect x="248" y="0" width="132" height="52" rx="6" fill="#141414"/>
    <rect x="270" y="15" width="78" height="8" fill="#FFF7B8" opacity="0.8"/>
  </g>

  <g transform="translate(780 545) rotate(-8)" filter="url(#softShadow)">
